name: Refresh Dashboard Data

on:
  # Every hour, Mon–Fri, 9 AM – 7 PM Eastern (UTC+4 in summer, UTC+5 in winter)
  # Using UTC 13:00–23:00 to cover both ET offsets
  schedule:
    - cron: '0 13-23 * * 1-5'
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Re-run if the extraction script or requirements change
  push:
    branches: [main]
    paths:
      - 'update_data.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data from SharePoint and update data.json
        run: python update_data.py
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SP_SITE_HOSTNAME:    peakpowerenergy.sharepoint.com
          SP_SITE_PATH:        /sites/PeakPowerEnergy
          SP_FILE_NAME:        VT_Weekly_Template_FINAL.xlsx

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "data.json unchanged — nothing to commit"
          else
            git commit -m "chore: refresh dashboard data [skip ci]"
            git push
          fi
